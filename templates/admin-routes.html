<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Route Monitoring | Admin</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='admin-routes.css') }}">

  <!-- 🔐 ADMIN AUTH CHECK -->
  <script>
    if (
      localStorage.getItem("loggedIn") !== "true" ||
      localStorage.getItem("userRole") !== "admin"
    ) {
      window.location.replace("/");
    }
  </script>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar">
  <div class="logo">🚍 Insight Tracker – Admin</div>

  <ul class="nav-links">
    <li><a href="/admin">Dashboard</a></li>
    <li><a href="/admin-routes">Routes</a></li>
    <li><a href="/admin-reports">Reports</a></li>

    <li>
      <button class="route-btn" onclick="logout()">Logout</button>
    </li>
  </ul>
</nav>

<!-- ================= MAIN CONTENT ================= -->

<section class="container">

  <h2>Route Monitoring & Control</h2>

  <!-- ========= ADD ROUTE FORM ========= -->

  <div class="card">
    <h3>Add New Route</h3>

    <form method="POST" action="/admin/add-route" class="route-form">

      <input type="text" name="source" placeholder="Source" required>

      <input type="text" name="destination" placeholder="Destination" required>

      <input type="text" name="timing" placeholder="Timing (e.g. 10:30 AM)">

      <select name="status">
        <option value="On Time">On Time</option>
        <option value="Slight Delay">Slight Delay</option>
        <option value="Delayed">Delayed</option>
      </select>

      <button type="submit" class="route-btn">Add Route</button>

    </form>
  </div>

  <!-- ========= ROUTES FROM DATABASE ========= -->

  <div class="grid" id="adminRouteGrid">

    {% if routes %}

      {% for r in routes %}

      <div class="card">

        <h3>🚌 {{ r.source }} → {{ r.destination }}</h3>

        <p><strong>Timing:</strong> {{ r.timing }}</p>

        <p>
          <strong>Status:</strong>
          <span class="status-text">{{ r.status }}</span>
        </p>

      </div>

      {% endfor %}

    {% else %}

      <p>No routes added yet.</p>

    {% endif %}

  </div>

</section>

<!-- ================= SCRIPTS ================= -->

<script src="{{ url_for('static', filename='auth.js') }}"></script>

<script>
  function logout() {
    localStorage.clear();
    window.location.href = "/";
  }
</script>

</body>
</html>
